[DEFAULT]

; --------- Logging-Level festlegen ---------
; ERROR:   Nur Fehler werden protokolliert
; WARNING: Fehler und Warnungen werden protokolliert
; INFO:    Fehler, Warnungen und Info-Meldungen werden protokolliert
; DEBUG:   Fehler, Warnungen, Info- und Debug-Meldungen werden protokolliert
LOGGING = INFO


; --------- Batterie-Stromgrenzen ---------
; +++ Die Grenzwerte gelten für jede einzelne Batterie / jedes einzelne BMS. +++
; +++ Bei mehreren Batterien benötigst du einen Batterie-Aggregator. +++
MAX_BATTERY_CHARGE_CURRENT    = 17.0
MAX_BATTERY_DISCHARGE_CURRENT = 150.0


; --------- Zellspannungen ---------
; Beschreibung:
;     Berechnet die minimale und maximale Batteriespannung basierend auf der Anzahl der Zellen und deren Spannung.
;     ACHTUNG: Dies verhindert KEIN Überladen oder Tiefentladen einzelner Zellen.
;     Um Überladung und Tiefentladung einzelner Zellen zu verhindern, verwende diese Funktionen (standardmäßig aktiviert):
;         - Ladespannungsbegrenzung (verhindert Überladung)
;         - Zellspannungsbasierte Strombegrenzung (verhindert Überladung und Tiefentladung)
;
; Beispiel:
;     16 Zellen × 3,45 V/Zelle = 55,2 V maximale Ladespannung
;     16 Zellen × 2,90 V/Zelle = 46,4 V minimale Entladespannung
;
; Minimale Zellspannung (darf NICHT als Abschaltspannung missverstanden werden)
;     Wird verwendet für:
;         - Sicherstellen, dass die berechnete Ladespannungsgrenze (CVL) nicht darunter fällt, falls dynamisch berechnet
;         - SoC auf 0 % setzen, falls SOC_CALCULATION aktiviert ist
MIN_CELL_VOLTAGE   = 2.900

; Maximale Zellspannung (kann als Bulk-/Absorptionsspannung angesehen werden)
; Wird verwendet für:
;     - Festlegen der maximalen Ladespannungsgrenze (CVL)
;     - SoC auf 100 % setzen, falls SOC_CALCULATION aktiviert ist
MAX_CELL_VOLTAGE   = 3.520

; Float-Zellspannung (kann als Ruhespannung angesehen werden)
; Wird verwendet für:
;     - Festlegen der maximalen Ladespannung (CVL) nachdem die Batterie vollständig geladen ist
FLOAT_CELL_VOLTAGE = 3.375


; --------- SoC-Reset-Spannung (muss mit den BMS-Einstellungen übereinstimmen) ---------
; +++ Dieser Abschnitt ist unabhängig und hat nichts mit dem Abschnitt „SoC-Berechnung“ weiter unten zu tun. +++
; Wird verwendet, um den SoC periodisch auf 100 % zurückzusetzen und SoC-Drift zu korrigieren.
; Beschreibung:
;     Einige BMS-Systeme müssen den SoC regelmäßig auf 100 % zurücksetzen, weil der SoC driftet.
;     Beispiel JKBMS: Setzt den internen SoC-Wert zurück, sobald eine Zelle die OVP-Spannung erreicht.
;     Dadurch kann die Ladespannung regelmäßig angehoben werden, um diesen Reset auszulösen.
;     (Andere BMS wie z. B. Daly benötigen ein aktives Überschreiben des SoC-Parameters. Das passiert automatisch,
;      wenn der Lademodus von Bulk/Absorption auf Float wechselt und die Zellen ausgeglichen sind. Diese brauchen
;      diese Einstellung hier nicht.)
;     Gib die Zellspannung an, bei der der SoC vom BMS auf 100 % zurückgesetzt werden soll.
;       - JKBMS: SoC wird auf 100 % gesetzt, wenn eine Zelle die Over Voltage Protection (OVP) erreicht.
;     Empfehlung: Mit OVP-Spannung minus 0,030 beginnen (siehe Beispiel).
;       - Schrittweise um 0,005 erhöhen, falls das System nicht in Float wechselt, obwohl die Zielspannung erreicht wurde.
;       - Schrittweise um 0,005 senken, falls OVP zu schnell erreicht wird und der Schutz mehrfach ausgelöst wird.
; Beispiel:
;     Wenn OVP bei 3.650 V liegt, dann mit 3.620 beginnen und in 0,005-Schritten anpassen.
; Hinweis:
;     Der Wert MUSS höher sein als MAX_CELL_VOLTAGE.
;     Wenn du CCCM_CV_ENABLE auf true setzt, musst du auch CELL_VOLTAGES_WHILE_CHARGING entsprechend anpassen,
;     sonst wird der Ladestrom auf 0 reduziert, bevor die Zielspannung erreicht ist und Float wird nie aktiviert.
SOC_RESET_CELL_VOLTAGE = 3.520
; Gib an, nach wie vielen Tagen die SoC-Reset-Spannung erneut erreicht werden soll.
; Der Timer wird jedes Mal zurückgesetzt, wenn die Reset-Spannung erreicht wurde.
; Leer lassen, wenn du diese Funktion nicht nutzen möchtest.
; Beispiel:
;     Wert = 15
;     Tag 1:   SoC-Reset erreicht
;     Tag 16:  SoC-Reset zum zweiten Mal erreicht
;     Tag 31:  SoC-Reset nicht erreicht (sehr bewölkt)
;     Tag 34:  SoC-Reset erreicht (Sonne kam wieder raus)
;     Tag 49:  SoC-Reset erneut erreicht, da es beim letzten Mal 3 Tage gedauert hat
SOC_RESET_AFTER_DAYS = 30


; --------- SoC-Berechnung ---------
; +++ Dieser Abschnitt ist unabhängig und hat nichts mit dem Abschnitt „SoC-Reset-Spannung“ oben zu tun. +++
; Beschreibung:
;     Den SoC im Treiber berechnen statt den vom BMS gemeldeten SoC zu verwenden.
;     Kann NICHT zusammen mit EXTERNAL_SENSOR_DBUS_PATH_SOC verwendet werden.
; True:
;     SoC im Treiber berechnen.
;     - Gemeldeten Strom integrieren
;     - SoC auf 100 % setzen, wenn die Batterie in den Float-Modus wechselt (benötigt CVCM_ENABLE = true)
;     - SoC auf 0 % setzen, wenn:
;         * Niedrigste Zellspannung ≤ MIN_CELL_VOLTAGE
;         * Batterie mindestens 300 Sekunden entladen wird
; False:
;     Vom BMS gemeldeten SoC-Wert übernehmen
SOC_CALCULATION = False

; --------- Stromkorrektur ---------
; Korrigiert den vom BMS gemeldeten Strom mit einer Korrektur-Liste.
; CURRENT_REPORTED_BY_BMS:   Liste der vom BMS gemeldeten Stromwerte
; CURRENT_MEASURED_BY_USER:  Liste der tatsächlich gemessenen Stromwerte
; Wenn beide Listen identisch sind, ist die Funktion deaktiviert.

; Beispiel – kleine Ströme auf Null setzen:
;     CURRENT_REPORTED_BY_BMS = -300, -0.5, 0.5, 300
;     CURRENT_MEASURED_BY_USER = -300, 0.0, 0.0, 300

; Beispiel – Nullstrom auf kleinen Wert setzen:
;     CURRENT_REPORTED_BY_BMS = -300, -1, 0.0, 0.1, 1, 300
;     CURRENT_MEASURED_BY_USER = -300, -1, -0.4, 0.0, 1, 300
CURRENT_REPORTED_BY_BMS  = -300, 300
CURRENT_MEASURED_BY_USER = -300, 300


; --------- Bluetooth-BMS ---------
; +++ Bluetooth-Verbindungen können auf manchen Systemen instabil sein. +++
; +++ Für eine stabile Verbindung wird die serielle Verbindung empfohlen. +++
; Beschreibung:
;     Welches Bluetooth-BMS und welche MAC-Adresse verwendet werden soll. Leer lassen = deaktiviert.
; Verfügbare Bluetooth-BMS:
;     Jkbms_Ble, LiTime_Ble, LltJbd_Ble
; Beispiel für ein BMS:
;     BLUETOOTH_BMS = Jkbms_Ble C8:47:80:39:72:A0
; Beispiel für mehrere BMS:
;     BLUETOOTH_BMS = Jkbms_Ble C8:47:80:39:72:A0, Jkbms_Ble C8:47:8C:00:00:11, Jkbms_Ble C8:47:8C:00:00:22
BLUETOOTH_BMS =

; Erzwingt Polling statt aktiver Callbacks.
; Kann bei instabilen Bluetooth-Verbindungen helfen.
; False: Aktive Callbacks verwenden, falls vom BMS unterstützt
; True:  Polling verwenden
BLUETOOTH_USE_POLLING = True

; Versucht, den BLE-Stack zurückzusetzen, wenn die Verbindung verloren geht oder ein Absturz erkannt wird.
BLUETOOTH_FORCE_RESET_BLE_STACK = False


; --------- Bluetooth über USB verwenden ---------
; +++ Funktioniert nur auf Raspberry-Pi-Geräten. +++
; Beschreibung:
;     Einige Nutzer berichten von Problemen mit dem eingebauten Bluetooth-Modul.
;     Ein USB-Bluetooth-Modul kann das Problem eventuell lösen.
;     Nach Änderung dieser Einstellung das GX-Gerät neu starten.
;     Das USB-Modul muss BLE unterstützen (Bluetooth-Version ≥ 4.0).
;     Andere Bluetooth-Geräte (z. B. Ruuvi-Tags) wurden noch nicht getestet.
; False: Eingebautes Bluetooth-Modul verwenden
; True:  Eingebautes Modul deaktivieren und USB-Modul verwenden
BLUETOOTH_USE_USB = False


; --------- CAN-BMS ---------
; Beschreibung:
;     CAN-Port(s) angeben, an dem/denen das BMS angeschlossen ist. Leer = deaktiviert.
;     Verfügbare CAN-Ports anzeigen mit: canshow
; Verfügbare CAN-BMS:
;     Daly_Can, Jkbms_Can
; Beispiel ein Port (Cerbo GX MK2, Ekrano GX):
;     CAN_PORT = vecan0, vecan1
; Beispiel ein Port (Cerbo GX, Raspberry Pi):
;     CAN_PORT = can0
; Beispiel mehrere Ports:
;     CAN_PORT = can0, can8, can9
CAN_PORT =


; --------- Daisy-Chain-Konfiguration (mehrere BMS an einem Kabel) ---------
; Beschreibung:
;     Hexadezimale Batterie-Adressen angeben, bei denen nach einem BMS gesucht werden soll.
;     Wenn leer, verbindet sich der Treiber nur mit der im Treiber hinterlegten Standardadresse.
;     Mehr Informationen in der Dokumentation:
;     https://mr-manuel.github.io/venus-os_dbus-serialbattery_docs/general/connect
; Beispiel:
;     BATTERY_ADDRESSES = 0x01, 0x02, 0x03, 0x04
BATTERY_ADDRESSES =


; --------- Verhalten bei Verbindungsverlust zum BMS ---------
; Beschreibung:
;     Laden und Entladen sperren, wenn die Kommunikation zum BMS abbricht.
;     Wenn du das BMS absichtlich entfernst, musst du den Treiber/das System neu starten, um die Sperre aufzuheben.
; False:
;     Laden und Entladen werden für 20 Minuten nicht gesperrt, solange die Zellspannungen zwischen
;     BLOCK_ON_DISCONNECT_VOLTAGE_MIN und BLOCK_ON_DISCONNECT_VOLTAGE_MAX liegen.
;     Andernfalls Sperrung nach 60 Sekunden.
; True:
;     Sofortige Sperrung von Laden und Entladen bei Verbindungsabbruch.
;     Entsperrung erfolgt bei Wiederherstellung der Verbindung oder Neustart des Treibers/Systems.
;     (Dies ist das Standardverhalten bei Victron-Energy-Geräten.)
BLOCK_ON_DISCONNECT = False
; Wie lange (in Minuten) der Treiber Laden und Entladen nach Verbindungsverlust weiter erlauben soll.
BLOCK_ON_DISCONNECT_TIMEOUT_MINUTES = 20
; Spannungsbereich, in dem die zuletzt abgerufenen Werte als sicher gelten, damit 20 Minuten ohne neue Daten weitergearbeitet werden kann.
BLOCK_ON_DISCONNECT_VOLTAGE_MIN = 3.25
BLOCK_ON_DISCONNECT_VOLTAGE_MAX = 3.35


; --------- Externer Sensor für Strom und/oder SoC ---------
; Beschreibung:
;     dbus-Gerät und Pfad des externen Sensors angeben.
;     Die Pfade kannst du mit dem Befehl dbus-spy herausfinden.
;     EXTERNAL_SENSOR_DBUS_PATH_SOC funktioniert NICHT zusammen mit SOC_CALCULATION = True.
; Beispiel für einen SmartShunt als externen Stromsensor:
;     EXTERNAL_SENSOR_DBUS_DEVICE = com.victronenergy.battery.ttyS2
;     EXTERNAL_SENSOR_DBUS_PATH_CURRENT = /Dc/0/Current
;     EXTERNAL_SENSOR_DBUS_PATH_SOC = /Soc
EXTERNAL_SENSOR_DBUS_DEVICE =
EXTERNAL_SENSOR_DBUS_PATH_CURRENT =
EXTERNAL_SENSOR_DBUS_PATH_SOC =


; --------- Lademodus ---------
; Wähle den Modus für Spannungs-/Strombegrenzungen.
; 1: Linearer Modus mit sanfteren Werten.
;     Für CCL und DCL werden Zwischenwerte berechnet → sanftere Übergänge.
; 2: Stufenmodus mit harten Grenzwerten.
CHARGE_MODE = 1

; Alle wie viele Sekunden die linearen Werte neu berechnet werden sollen.
CVL_RECALCULATION_EVERY = 60
; Prozentuale Änderung, die eine sofortige Neuberechnung auslöst.
; Beispiel: 33 bedeutet sofortige Änderung, wenn der Wert sich um mehr als 33 % ändert.
CVL_RECALCULATION_ON_MAX_PERCENTAGE_CHANGE = 33


; --------- Ladespannungsbegrenzung (beeinflusst CVL) ---------
; Beschreibung:
;     Maximale Ladespannung begrenzen (MAX_CELL_VOLTAGE × Zellanzahl), nach Erreichen auf Float-Spannung
;     wechseln und wieder zurückschalten.
;     False: Maximale Ladespannung wird immer gehalten.
;     True:  Maximale Spannung wird je nach Lademodus reduziert.
;         Nach Erreichen der Maximalspannung und wenn die maximale Zellspannungsdifferenz ≤
;         SWITCH_TO_FLOAT_CELL_VOLTAGE_DIFF ist, wird nach weiteren SWITCH_TO_FLOAT_WAIT_FOR_SEC
;         Sekunden auf Float-Spannung gewechselt.
;         Zurück auf Maximalspannung, wenn Zellspannungsdifferenz ≥ SWITCH_TO_BULK_CELL_VOLTAGE_DIFF
;         ODER SoC unter SWITCH_TO_BULK_SOC_THRESHOLD fällt.
; Beispiel bei True:
;     Batterie erreicht 55,2 V, maximale Zell-Differenz = 0,010 V → nach weiteren 900 Sekunden auf
;     Float-Spannung 53,6 V wechseln, um die Batterien zu schonen.
;     Zurück auf 55,2 V, wenn Differenz > 0,080 V oder SoC < 80 %.
; Ladespannungs-Management aktivieren (True/False).
CVCM_ENABLE = True

; -- Wechsel zu Float
; INFO: Wenn SWITCH_TO_FLOAT_WAIT_FOR_SEC und SWITCH_TO_FLOAT_CELL_VOLTAGE_DIFF deaktiviert sind (leer oder 10),
;       wechselt das System sofort auf Float-Spannung, sobald die Maximalspannung erreicht ist.

; ---- Zeitbasiert ----
; Wie lange die Maximalspannung zusätzlich gehalten werden soll, wenn Zellen ausgeglichen sind.
; Zum Deaktivieren leer lassen oder 0 setzen.
SWITCH_TO_FLOAT_WAIT_FOR_SEC = 900

; ---- Zellspannungsdifferenz-basiert ----
; Zellspannungs-Differenz, bei der die Maximalspannung gehalten wird, bis sie kleiner/gleich diesem Wert ist.
; Zum Deaktivieren leer lassen oder 10 setzen.
SWITCH_TO_FLOAT_CELL_VOLTAGE_DIFF      = 0.010
; Abweichung, ab der der Timer neu gestartet wird.
; Beispiel: SWITCH_TO_FLOAT_CELL_VOLTAGE_DIFF = 0.010 + SWITCH_TO_FLOAT_CELL_VOLTAGE_DEVIATION = 0.003 → Timer-Neustart bei > 0,013 V
SWITCH_TO_FLOAT_CELL_VOLTAGE_DEVIATION = 0.003

; -- Wechsel zurück zu Bulk/Absorption
; WARNUNG: Wenn SWITCH_TO_BULK_SOC_THRESHOLD und SWITCH_TO_BULK_CELL_VOLTAGE_DIFF deaktiviert sind,
;          bleibt das System dauerhaft auf Float-Spannung, bis Treiber/System neu gestartet wird.

; ---- SoC-basiert ----
; SoC-Grenze, unter der wieder auf Maximalspannung gewechselt wird.
; Zum Deaktivieren leer lassen oder 0 setzen.
SWITCH_TO_BULK_SOC_THRESHOLD = 80

; ---- Zellspannungsdifferenz-basiert ----
; Zellspannungs-Differenz, ab der wieder auf Maximalspannung gewechselt wird.
; Richtwert: Zellen gelten als unausgeglichen, wenn Differenz > 5 % der Nennspannung.
; Beispiel: 3,2 V × 5 / 100 = 0,160 V
; Zum Deaktivieren leer lassen oder 10 setzen.
SWITCH_TO_BULK_CELL_VOLTAGE_DIFF = 0.080


; --------- Zellspannungsbegrenzung (beeinflusst CVL) ---------
; Diese Funktion verhindert das Überladen einzelner Zellen bei schlecht ausgeglichener Batterie,
; was sonst dazu führen könnte, dass das BMS wegen Überspannung abschaltet.
;
; Beispiel:
;     15 Zellen bei 3,4 V, 1 Zelle bei 3,6 V. Gesamtspannung = 54,6 V.
;     Das Victron-System sieht keinen Grund, den Ladestrom zu reduzieren, da die Sollspannung 55,2 V ist.
;     Hier greift die Zellspannungsbegrenzung und senkt die Steuerspannung, um nahe an MAX_CELL_VOLTAGE zu bleiben.
;
; Theoretisch könnte das auch über CCL gemacht werden, aber CVL hat zwei Vorteile:
;   - Bei gut ausgeglichener Batterie kann der Strom bis zum Ladeende hoch bleiben (MAX_CELL_VOLTAGE nutzen).
;   - Bei MPPTs mit aktiviertem DC-Feed-in wird CCL vom Victron-System ignoriert → CVL ist die einzige Möglichkeit,
;     die höchste Zelle in schlecht balancierten Systemen vor Überladung zu schützen.
;
; Es gibt verschiedene Berechnungsmethoden, wenn eine Zelle MAX_CELL_VOLTAGE überschreitet:
;   1. P-Regler (Penalty-Sum-Methode)
;      Die Überspannung aller Zellen über MAX_CELL_VOLTAGE wird summiert und die Steuerspannung um diese „Strafsumme“ gesenkt.
;      Wird alle CVL_RECALCULATION_EVERY Sekunden neu berechnet.
;   2. I-Regler
;      Versucht, die Spannung der höchsten Zelle auf MAX_CELL_VOLTAGE + SWITCH_TO_FLOAT_CELL_VOLTAGE_DIFF zu regeln
;      (z. B. 3,45 V + 0,01 V = 3,46 V). Bei Überschreitung CVL senken, bei Unterschreitung erhöhen.
;      Ein I-Anteil von 0,2 V/Vs (CVL_ICONTROLLER_FACTOR) hat sich als stabil und schnell erwiesen.
;      Weniger schnell als Penalty-Sum, dafür meist glatter, stabiler gegen Flattern und ohne bleibende Regelabweichung.
;      Mehr Infos: https://github.com/Louisvdw/dbus-serialbattery/pull/882
;   3. Clipped-Sum-Regler
;      „Gekappte-Summen“-Regler, begrenzt die Gesamt-Ladespannung basierend auf Einzelzellen-Überspannung,
;      mit kleinem Puffer für Balancieren/Trickle-Laden. Kein klassischer P-, I- oder PI-Regler, sondern logikbasierter Begrenzer.
;
; Hinweis:
;     Für optimales Verhalten ca. 0,05–0,10 V Abstand zwischen MAX_CELL_VOLTAGE (oder SOC_RESET_CELL_VOLTAGE, falls genutzt)
;     und der BMS-Überspannungsschutz-Schwelle (OVP) einplanen.
;
; 0: Deaktiviert
; 1: P-Regler (Penalty-Sum-Methode)
; 2: I-Regler
; 3: Clipped-Sum-Regler
CVL_CONTROLLER_MODE = 3
; I-Regler-Faktor (V/Vs)
CVL_ICONTROLLER_FACTOR = 0.2


; --------- Zellspannungsbasierte Strombegrenzung (beeinflusst CCL/DCL) ---------
; Beschreibung:
;     Maximaler Lade-/Entladestrom wird je nach minimaler und maximaler Zellspannung erhöht oder gesenkt.
; Beispiel:
;     18 Zellen × 3,55 V/Zelle = 63,9 V max. Ladespannung
;     18 Zellen × 2,70 V/Zelle = 48,6 V min. Entladespannung
;     In Wirklichkeit erreichen nicht alle Zellen gleichzeitig dieselbe Spannung.
;     Der (Ent)Ladestrom wird reduziert/erhöht, sobald auch nur eine einzige Zelle die Grenze erreicht.
;
; Zellspannungsbasierte Lade-Strombegrenzung aktivieren (True/False).
CCCM_CV_ENABLE = True
; Zellspannungsbasierte Entlade-Strombegrenzung aktivieren (True/False).
DCCM_CV_ENABLE = True

; Stufen zur Reduzierung des Batteriestroms.
; Bei CHARGE_MODE = 1 (linear) werden die Werte linear zwischen den Stufen interpoliert.
CELL_VOLTAGES_WHILE_CHARGING      = 3.450, 3.500, 3.520
MAX_CHARGE_CURRENT_CV_FRACTION    = 1.00, 0.50, 0.30

CELL_VOLTAGES_WHILE_DISCHARGING   = 2.900, 2.950, 3.050, 3.150
MAX_DISCHARGE_CURRENT_CV_FRACTION = 0.00, 0.10, 0.50, 1.00


; --------- Temperaturbasierte Strombegrenzung (beeinflusst CCL/DCL) ---------
; Beschreibung:
;     Maximaler Lade-/Entladestrom wird je nach Temperatur erhöht oder gesenkt.
;     HINWEIS: Temperaturen in °Celsius. Temperatursensoren 1 bis 4 werden für die Berechnung verwendet.
; Beispiel:
;     Die Temperaturgrenze wird überwacht, um die Ströme zu begrenzen.
;     Bei zwei Sensoren wird der schlechteste Fall (niedrigster erlaubter Strom) genommen.
; Temperaturbasierte Lade-Strombegrenzung aktivieren (True/False).
CCCM_T_ENABLE = True
; Temperaturbasierte Entlade-Strombegrenzung aktivieren (True/False).
DCCM_T_ENABLE = True

; Stufen zur Reduzierung des Batteriestroms.
; Bei CHARGE_MODE = 1 (linear) werden die Werte linear zwischen den Stufen interpoliert.
TEMPERATURES_WHILE_CHARGING      =    0,    2,    5,   10,   40,   45,   50,   55
MAX_CHARGE_CURRENT_T_FRACTION    = 0.00, 0.25, 0.50, 1.00, 1.00, 0.50, 0.25, 0.00

TEMPERATURES_WHILE_DISCHARGING   =  -10,    0,    5,   10,   40,   45,   50,   55
MAX_DISCHARGE_CURRENT_T_FRACTION = 0.00, 0.25, 0.50, 1.00, 1.00, 0.50, 0.25, 0.00


; --------- MOSFET-Temperaturbasierte Strombegrenzung (beeinflusst CCL/DCL) ---------
; Beschreibung:
;     Maximaler Lade-/Entladestrom wird je nach MOSFET-Temperatur erhöht oder gesenkt.
;     HINWEIS: Temperaturen in °Celsius. MOSFET-Temperatursensor wird nur verwendet, wenn vorhanden.
; MOSFET-Temperaturbasierte Lade-Strombegrenzung aktivieren (True/False).
CCCM_T_MOSFET_ENABLE = True
; MOSFET-Temperaturbasierte Entlade-Strombegrenzung aktivieren (True/False).
DCCM_T_MOSFET_ENABLE = True

; Stufen zur Reduzierung des Batteriestroms.
; Bei CHARGE_MODE = 1 (linear) werden die Werte linear zwischen den Stufen interpoliert.
MOSFET_TEMPERATURES_WHILE_CHARGING      =   70,   80,   90
MAX_CHARGE_CURRENT_T_MOSFET_FRACTION    = 1.00, 0.25, 0.00

MOSFET_TEMPERATURES_WHILE_DISCHARGING   =   70,   80,   90
MAX_DISCHARGE_CURRENT_T_MOSFET_FRACTION = 1.00, 0.25, 0.00


; --------- SoC-basierte Strombegrenzung (beeinflusst CCL/DCL) ---------
; Beschreibung:
;     Maximaler Lade-/Entladestrom wird je nach Ladezustand (SoC) erhöht oder gesenkt.
;     Da der SoC nicht so genau ist wie die Zellspannung, ist diese Option standardmäßig deaktiviert.
; SoC-basierte Lade-Strombegrenzung aktivieren (True/False).
CCCM_SOC_ENABLE = False
; SoC-basierte Entlade-Strombegrenzung aktivieren (True/False).
DCCM_SOC_ENABLE = False

; Stufen zur Reduzierung des Batteriestroms.
; Bei CHARGE_MODE = 1 (linear) werden die Werte linear zwischen den Stufen interpoliert.
SOC_WHILE_CHARGING                 =   98,   95,   90,   85
MAX_CHARGE_CURRENT_SOC_FRACTION    = 0.10, 0.20, 0.50, 1.00

SOC_WHILE_DISCHARGING              =    5,   10,   15,   20
MAX_DISCHARGE_CURRENT_SOC_FRACTION = 0.10, 0.20, 0.50, 1.00


; --------- Wieder-Freigabe-Schwelle für CCL/DCL ---------
; Diese Schwelle gilt, wenn mindestens eine der folgenden Begrenzungen aktiviert ist:
;   - Zellspannungs-Strombegrenzung (CCCM_CV_ENABLE, DCCM_CV_ENABLE)
;   - Temperaturbegrenzung (CCCM_T_ENABLE, DCCM_T_ENABLE)
;   - SoC-Begrenzung (CCCM_SOC_ENABLE, DCCM_SOC_ENABLE)
; Sobald der Strom auf 0 gefallen ist, wird er erst wieder erhöht, wenn diese Schwelle überschritten wird.
; Die Schwelle ist ein Prozentsatz des maximalen Lade-/Entladestroms.
; Dies verhindert schnelles Hin- und Herschalten (Flattern), das das System instabil machen und viele Meldungen erzeugen kann.
; Beispiel:
;     Max. Ladestrom = 50 A, Schwelle = 0,02 (2 %) → Ladung startet erst wieder bei > 1 A (50 × 0,02)
;     Max. Entladestrom = 60 A, Schwelle = 0,02 (2 %) → Entladung startet erst wieder bei > 1,2 A (60 × 0,02)
CHARGE_CURRENT_RECOVERY_THRESHOLD_PERCENT = 0.015
DISCHARGE_CURRENT_RECOVERY_THRESHOLD_PERCENT = 0.015


; --------- Time-To-Go ---------
; Beschreibung:
;     Berechnet die verbleibende Zeit bis ein bestimmter SoC erreicht wird und zeigt sie in der GUI an.
;     Wenn ESS aktiviert ist und eine „Optimierte...“-Option ausgewählt wurde, wird die ESS-SoC-Grenze verwendet.
;     Andernfalls wird SOC_LOW_WARNING aus dieser Konfigurationsdatei verwendet.
;     Neuberechnung erfolgt alle TIME_TO_SOC_RECALCULATE_EVERY Sekunden.
TIME_TO_GO_ENABLE = True


; --------- Time-To-SoC ---------
; Beschreibung:
;     Berechnet die verbleibende Zeit bis bestimmte SoC-Werte erreicht werden.
; Beispiel:
;     TIME_TO_SOC_POINTS = 50, 25, 15, 0
;     6h 24m verbleibend bis 50 % SoC
;     17h 36m verbleibend bis 25 % SoC
;     22h 5m  verbleibend bis 15 % SoC
;     28h 48m verbleibend bis 0 % SoC
; Liste der SoC-Prozentwerte, die auf dbus und MQTT ausgegeben werden sollen.
; Je mehr Werte, desto höher die Systemlast. Mehr als 20 Intervalle werden nicht empfohlen.
; [Gültige Werte 0–100, kommagetrennt. Leer = deaktiviert]
; Beispiel: TIME_TO_SOC_POINTS = 100, 95, 90, 85, 75, 50, 25, 20, 10, 0
TIME_TO_SOC_POINTS =

; Welches Format für die TimeToSoc-Werte verwendet werden soll
; 1 = Nur Sekunden
; 2 = Zeit-String <Tage>d <Stunden>h <Minuten>m <Sekunden>s
; 3 = Beides „<Sekunden> [<Tage>d <Stunden>h <Minuten>m <Sekunden>s]“
TIME_TO_SOC_VALUE_TYPE = 2

; Alle wie viele Sekunden TimeToSoc neu berechnet werden soll.
; Minimum 5 Sekunden, um CPU-Überlastung zu vermeiden.
TIME_TO_SOC_RECALCULATE_EVERY = 60
; Auch negative Zeiten anzeigen (wenn man sich vom SoC-Punkt entfernt)
; Deaktivieren verbessert die Performance leicht.
TIME_TO_SOC_INC_FROM = False


; --------- History ---------
; Beschreibung:
;     Berechnet Verlaufswerte der Batterie, die vom BMS nicht geliefert werden.
HISTORY_ENABLE = True

