; Hinweis: SOC_LOW_WARNING kann auch für Time-To-Go verwendet werden, selbst wenn kein LltJbd-BMS vorhanden ist.
SOC_LOW_WARNING = 20
SOC_LOW_ALARM   = 10

; -- Daly Einstellungen
; Batteriestrom umkehren. Standard = nicht invertiert. -1 = invertiert.
INVERT_CURRENT_MEASUREMENT = 1

; -- ESC GreenMeter und Lipro Geräte-Einstellungen
GREENMETER_ADDRESS  = 1
LIPRO_START_ADDRESS = 2
LIPRO_END_ADDRESS   = 4
LIPRO_CELL_COUNT    = 15

; -- UBMS Einstellungen
; Voreinstellungen für Valence U-BMS (Ubms_can)
; Dieses BMS unterstützt mehrere Strings von Modulen (je 4 Zellen) in Serie und Parallel.
; Während die Anzahl der kommunizierenden Module vom Bus abgelesen werden kann, ist es sicherer,
; die Modul-Konfiguration direkt anzugeben (Serie/Parallel).
; Die konfigurierten Lade-/Entlade-Spannungen und -Ströme werden auf diese Konfiguration angewendet.
UBMS_CAN_MODULE_SERIES = 4
