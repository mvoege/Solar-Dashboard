; Midpoint-Grafik simulieren (True/False).
MIDPOINT_ENABLE = False

; Batteries Temperatur
; Gib an, wie die Batterietemperatur berechnet werden soll.
; Kommagetrennte Liste der Temperatursensor-Nummern, deren Durchschnitt verwendet wird.
