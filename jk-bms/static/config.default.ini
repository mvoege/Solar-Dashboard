; Zusätzliche Informationen in GUI → Serialbattery → Parameter anzeigen.
; Zeigt weitere Infos, um besser zu verstehen, wie der Treiber arbeitet und welche Werte gerade aktiv sind.
; Du musst nach unten scrollen, um alles zu sehen.
GUI_PARAMETERS_SHOW_ADDITIONAL_INFO = True

; Telemetrie-Einstellungen
; Um den Treiber zu verbessern, sammeln wir anonyme Telemetriedaten.
; Die Daten werden einmal pro Woche gesendet und nur zur Verbesserung verwendet.
; Einige gesammelte Daten: Venus OS Version, Treiberversion, Laufzeit, Batterietyp, Anzahl Batterien.
; Deaktivieren durch Setzen auf False.
TELEMETRY = True


; --------- Spannungsabfall ---------
; Wenn es zwischen BMS und Ladegerät einen Spannungsabfall durch Kabelquerschnitt oder -länge gibt,
; kannst du diesen hier angeben. Der Treiber addiert den Wert dann zur berechneten CVL, um den Abfall auszugleichen.
; Beispiel:
;     Zellanzahl: 16
;     MAX_CELL_VOLTAGE = 3.45
;     Berechnete Maximalspannung = 16 × 3,45 = 55,20 V
;     CVL wird auf 55,20 V gesetzt → Batterie wird geladen, bis das Ladegerät 55,20 V erreicht.
;     Das BMS misst wegen 0,15 V Abfall nur 55,05 V.
;     Da dbus-serialbattery 55,05 V vom BMS liest, wird 55,20 V nie erreicht → Maximalspannung bleibt ewig.
;     Mit VOLTAGE_DROP = 0.15 wird CVL auf 55,35 V gesetzt → BMS erreicht dann tatsächlich 55,20 V.
VOLTAGE_DROP = 0.00


; --------- BMS-spezifische Einstellungen ---------

; -- Eindeutige ID Einstellungen
; Wenn du im Log „DRIVER STOPPED! Another battery with the same serial number/unique identifier“ siehst,
; kannst du diese Option aktivieren.
; Beschreibung:
;     Einige BMS-Versionen liefern keine eindeutige ID und erlauben auch keine benutzerdefinierte.
;     In solchen Fällen kann der Port und die Adresse als eindeutige ID verwendet werden.
; Hinweis:
;     VRM-IDs und benutzerdefinierte Namen werden bei dieser Option eventuell nicht korrekt gespeichert/wiederhergestellt.
USE_PORT_AS_UNIQUE_ID = True

; -- Batteriekapazität
; Einige BMS unterstützen das Auslesen der Kapazität nicht. Hier manuell in Ah angeben.
; Gilt für:
;     - Daly
;     - Felicity
BATTERY_CAPACITY = 314

; -- Automatisches Zurücksetzen des BMS-SoC
; Wenn aktiviert, wird der BMS-SoC auf 100 % gesetzt, sobald von Absorption auf Float gewechselt wird.
; Benötigt CVCM_ENABLE = True.
; Gilt für:
;     - Daly BMS
;     - JKBMS BLE
AUTO_RESET_SOC = True

; -- DVCC-Werte vom BMS übernehmen
