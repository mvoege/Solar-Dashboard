; Leer = versucht, alle verfügbaren zu laden.
;
; Verfügbare serielle BMS:
;     Daly, Daren485, Ecs, EG4_Lifepower, EG4_LL, Felicity, HeltecModbus, HLPdataBMS4S, Jkbms, Jkbms_pb, KS48100, LltJbd, Pace, Renogy, Seplos, Seplosv3
; Standardmäßig deaktiviert (nur aktivieren, wenn benötigt):
;     ANT, MNB, Sinowealth
;
; Verfügbare CAN-BMS:
;     Daly_Can, Jkbms_Can, RV_C_Can, Ubms_Can
;
; Verfügbare Bluetooth-BMS:
;     Jkbms_Ble, Kilovault_Ble, LiTime_Ble, LltJbd_Ble
BMS_TYPE = Jkbms_pb

; Diese seriellen Geräte beim Start des Treibers ignorieren.
; Beispiel:
;     /dev/ttyUSB2, /dev/ttyUSB4
EXCLUDED_DEVICES = /dev/ttyUSB1

; Abfrageintervall des BMS in Sekunden.
; Wenn der Treiber zu viel CPU verbraucht, kannst du den Wert erhöhen, um die Abfragerate zu senken.
; Standard bei den meisten BMS = 1 Sekunde; manche BMS haben höhere Werte.
; Leer = Standardwert des BMS verwenden; Dezimalwerte erlaubt.
POLL_INTERVAL =

; Die Konfigurationseinstellungen unter dem dbus-Pfad "/Info/Config/" veröffentlichen.
PUBLISH_CONFIG_VALUES = False

; Alle Batteriedaten als JSON auf MQTT unter dem Topic
; "/N/<VRM_ID>/battery/<BATTERY_INSTANCE>/JsonData" veröffentlichen.
; Dieses Topic kann z. B. von dbus-mqtt-battery oder anderen MQTT-Clients genutzt werden.
PUBLISH_BATTERY_DATA_AS_JSON = False

; Format, in dem die Zellendaten auf dbus ausgegeben werden.
; 0 = Keine Zellspannungen veröffentlichen (nur min/max wie beim Standard-GX)
; 1 = Format: /Voltages/Cell (auch in Remote Console sichtbar)
; 2 = Format: /Cell/#/Volts
; 3 = Beides (Format 1 + 2)
