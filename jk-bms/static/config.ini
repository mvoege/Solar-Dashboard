[DEFAULT]
# --- Geräte-Einstellungen ---
EXCLUDED_DEVICES              = /dev/ttyUSB1
BMS_TYPE                      = Jkbms_pb
USE_PORT_AS_UNIQUE_ID         = True
LOGGING                       = INFO

# --- Strom-Limits (Passend zu deinem 15A Modul) ---
MAX_BATTERY_CHARGE_CURRENT    = 25.0
MAX_BATTERY_DISCHARGE_CURRENT = 150.0

# --- Zell-Limits (Sicher & Langlebig) ---
MIN_CELL_VOLTAGE              = 2.900
MAX_CELL_VOLTAGE              = 3.550
FLOAT_CELL_VOLTAGE            = 3.450
SOC_RESET_CELL_VOLTAGE        = 3.550

# --- SOC-Logik & Reset ---
SOC_RESET_AFTER_DAYS          = 7
SOC_CALCULATION               = False
AUTO_RESET_SOC                = True

# --- Lade-Modus (mr-manuel Linear-Mode) ---
CHARGE_MODE                                = 1
CVL_RECALCULATION_EVERY                    = 10
CVL_RECALCULATION_ON_MAX_PERCENTAGE_CHANGE = 10
CVCM_ENABLE                                = True

# --- Controller (Sanfte Regelung) ---
CVL_CONTROLLER_MODE           = 3
CVL_ICONTROLLER_FACTOR        = 0.7

# --- CCCM Ladekurve (Optimiert für 15A Solar) ---
CCCM_CV_ENABLE                 = True
CELL_VOLTAGES_WHILE_CHARGING      = 3.450, 3.500, 3.550
MAX_CHARGE_CURRENT_CV_FRACTION    = 1.000, 0.400, 0.010

# --- DCCM Entladekurve ---
DCCM_CV_ENABLE                 = True
CELL_VOLTAGES_WHILE_DISCHARGING   = 2.800, 2.900, 3.000, 3.100, 3.190
MAX_DISCHARGE_CURRENT_CV_FRACTION = 0.000, 0.005, 0.050, 0.250, 1.000

# --- Float/Bulk Umschaltung (Das Balancing-Fenster) ---
SWITCH_TO_FLOAT_WAIT_FOR_SEC      = 1200
SWITCH_TO_FLOAT_CELL_VOLTAGE_DIFF = 0.010
SWITCH_TO_BULK_SOC_THRESHOLD      = 85

# --- Temperatur-Schutz (Winter-Sicherung) ---
CCCM_T_ENABLE                  = True
DCCM_T_ENABLE                  = True
TEMPERATURES_WHILE_CHARGING      =    0,    2,    5,   10,   40,   45,   50,   55
MAX_CHARGE_CURRENT_T_FRACTION    = 0.00, 0.25, 0.50, 1.00, 1.00, 0.50, 0.25, 0.00
TEMPERATURES_WHILE_DISCHARGING   =  -10,    0,    5,   10,   40,   45,   50,   55
MAX_DISCHARGE_CURRENT_T_FRACTION = 0.00, 0.25, 0.50, 1.00, 1.00, 0.50, 0.25, 0.00

# --- Kapazität & Anzeige ---
BATTERY_CAPACITY               = 314.0
BATTERY_CELL_DATA_FORMAT       = 1
GUI_PARAMETERS_SHOW_ADDITIONAL_INFO = True
TIME_TO_GO_ENABLE              = True
HISTORY_ENABLE                 = True
TEMPERATURE_SOURCE_BATTERY    = 1